<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Definitely Normal Website</title>

<style>
body{
    margin:0;
    font-family:Comic Sans MS, cursive;
    background:linear-gradient(135deg,#ffd6e7,#d8f3ff,#fff4b5);
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:30px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
    max-width:350px;
}

button{
    margin-top:20px;
    padding:12px 22px;
    border:none;
    border-radius:50px;
    background:#ff77aa;
    color:white;
    font-size:18px;
    cursor:pointer;
}

#text{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}

.cat{
    position:absolute;
    font-size:35px;
    animation:float 8s linear infinite;
}

@keyframes float{
from{
transform:translateY(120vh) rotate(0deg);
}
to{
transform:translateY(-120vh) rotate(360deg);
}
}
</style>

</head>

<body>

<div class="box">
<h1>🌸 Welcome, Human(?) 🌸</h1>

<p>This website is 99% cute.<br>
The other 1% is emotionally unstable.</p>

<button onclick="weird()">Press at your own risk</button>

<div id="text">🙂</div>

</div>

<script>

const messages=[
"🐸 A frog just approved your existence.",
"🦆 The ducks are judging you.",
"🍞 Congratulations! You are now a loaf of bread.",
"👁️ Someone blinked. It wasn't you.",
"🐈 The cat has stolen your homework.",
"🛸 Aliens rated you 8.7/10.",
"🥔 You unlocked... POTATO MODE.",
"✨ You are legally adorable."
];

function weird(){
document.getElementById("text").innerHTML=
messages[Math.floor(Math.random()*messages.length)];

document.body.style.background=
`hsl(${Math.random()*360},80%,85%)`;
}

setInterval(()=>{
const e=document.createElement("div");
e.className="cat";
e.innerHTML=["🐱","🐸","🦆","🍞","✨","👀"][Math.floor(Math.random()*6)];
e.style.left=Math.random()*100+"vw";
e.style.animationDuration=(4+Math.random()*6)+"s";
document.body.appendChild(e);

setTimeout(()=>e.remove(),10000);
},600);

</script>

</body>
</html>
