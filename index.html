<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Definitely Normal Website</title>

<style>
body{
    margin:0;
    font-family:Comic Sans MS, cursive;
    background:linear-gradient(135deg,#ffd6e7,#d8f3ff,#fff4b5);
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:30px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
    max-width:350px;
}

button{
    margin-top:20px;
    padding:12px 22px;
    border:none;
    border-radius:50px;
    background:#ff77aa;
    color:white;
    font-size:18px;
    cursor:pointer;
}

#text{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}

.cat{
    position:absolute;
    font-size:35px;
    animation:float 8s linear infinite;
}

@keyframes float{
from{
transform:translateY(120vh) rotate(0deg);
}
to{
transform:translateY(-120vh) rotate(360deg);
}
}
</style>
</
